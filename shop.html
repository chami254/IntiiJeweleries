<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - Intii Jeweleries</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  

  <div class="nav-right">
  <h2>Intii Jeweleries</h2>
  <div class="cart-icon" onclick="toggleCart()">
      <i class="fas fa-shopping-cart"></i>
      <span id="cart-count">0</span>
  </div>
  </div>
  
  <div class="menu-icon" onclick="toggleMenu()">
  <i class="fas fa-bars"></i>
  </div>
  
  <div class="nav-left" id="navLinks">
  
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="shop.html">Shop</a>
  <a href="#">Contacts</a>
  
  <div class="social-icons" style="text-align:right;">
  <a href="#"><i class="fab fa-instagram"></i></a>
  <a href="#"><i class="fab fa-facebook"></i></a>
  <a href="#"><i class="fab fa-tiktok"></i></a>
  <a href="#"><i class="fab fa-twitter"></i></a>
  </div>
  
  </div>

  <div class="cart-drawer" id="cartDrawer">

      <h2>Your Cart</h2>
      
      <div id="cart-items"></div>
      
      <p class="cart-total">Total: $<span id="cart-total">0</span></p>
      
      <button class="checkout-btn">Checkout</button>
      
      </div>
  
  </nav>



<h1 class="shop-title">Shop Our Collection</h1>

<!-- FILTER BAR -->

<div class="shop-controls">

<input type="text" id="search" placeholder="Search products...">

<select id="category">
<option value="all">All Categories</option>
<option value="rings">Rings</option>
<option value="necklaces">Necklaces</option>
<option value="bracelets">Bracelets</option>
</select>

<select id="sort">
<option value="default">Sort By</option>
<option value="low">Price: Low to High</option>
<option value="high">Price: High to Low</option>
</select>

</div>

<!-- PRODUCT GRID -->

<div class="product-grid" id="product-grid"></div>

<script src="shop.js"></script>

</body>
</html>
